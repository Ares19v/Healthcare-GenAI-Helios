name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install linting tools ─────────────────────────────────────────
      - name: Install linting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 Pillow requests tqdm

      # ── 4. Lint Python scripts ───────────────────────────────────────────
      - name: Lint scripts/ with flake8
        run: |
          flake8 scripts/ \
            --max-line-length=100 \
            --ignore=E501,W503 \
            --statistics

      # ── 5. Validate training config is valid TOML ────────────────────────
      - name: Validate training/config_lora.toml
        run: |
          python - <<'EOF'
          import tomllib, sys
          path = "training/config_lora.toml"
          try:
              with open(path, "rb") as f:
                  tomllib.load(f)
              print(f"[OK] {path} is valid TOML")
          except Exception as e:
              print(f"[FAIL] {path}: {e}")
              sys.exit(1)
          EOF

      # ── 6. Validate all workflow JSONs ────────────────────────────────────
      - name: Validate workflows/*.json
        run: |
          python - <<'EOF'
          import json, sys, pathlib
          errors = []
          for p in sorted(pathlib.Path("workflows").glob("*.json")):
              try:
                  with open(p) as f:
                      json.load(f)
                  print(f"[OK]   {p.name}")
              except Exception as e:
                  print(f"[FAIL] {p.name}: {e}")
                  errors.append(p.name)
          if errors:
              sys.exit(1)
          EOF

      - name: Check no model files are tracked by Git
        run: |
          python - <<'EOF'
          import subprocess, sys
          extensions = [".safetensors", ".ckpt", ".pt", ".bin"]
          result = subprocess.run(
              ["git", "ls-files"],
              capture_output=True, text=True
          )
          all_tracked = result.stdout.strip().splitlines()
          bad = [f for f in all_tracked if any(f.endswith(ext) for ext in extensions)]
          if bad:
              print(f"[FAIL] Large model files are tracked by Git:")
              for f in bad: print(f"       {f}")
              print("       Add them to .gitignore immediately.")
              sys.exit(1)
          print("[OK] No large model files tracked by Git.")
          EOF

      # ── 8. Verify required repo structure ────────────────────────────────
      - name: Verify required directory structure
        run: |
          python - <<'EOF'
          import pathlib, sys
          required = [
              "dataset/20_HeliosSurgeon",
              "dataset/20_HeliosClinic",
              "models",
              "workflows",
              "outputs",
              "scripts/auto_caption.py",
              "scripts/batch_generate.py",
              "training/config_lora.toml",
              "training/sample_prompts.txt",
              "workflows/Helios_Surgeon_v1.json",
              "workflows/Helios_Clinic_v1.json",
              "requirements.txt",
              "LICENSE",
              ".gitignore",
          ]
          missing = [p for p in required if not pathlib.Path(p).exists()]
          if missing:
              print("[FAIL] Missing required paths:")
              for m in missing: print(f"       - {m}")
              sys.exit(1)
          print(f"[OK] All {len(required)} required paths present.")
          EOF
